# Render Blueprint: OpenClaw + AlphaClaw + GBrain
# Deploys an AlphaClaw-wrapped OpenClaw gateway with GBrain pre-installed as a
# skill pack, backed by a Render Postgres instance with pgvector for hybrid
# semantic + keyword search over your knowledge base.
#
# Resources are grouped under a Render project so the web service, disk, and
# Postgres show up together in the dashboard and can be promoted to additional
# environments (staging, etc.) without restructuring the file.

projects:
  - name: openclaw-gbrain
    environments:
      - name: production
        services:
          - type: web
            name: openclaw-gbrain
            runtime: docker
            plan: standard
            region: oregon
            healthCheckPath: /health
            dockerfilePath: ./Dockerfile
            disk:
              name: alphaclaw-data
              mountPath: /data
              sizeGB: 10
            envVars:
              # --- AlphaClaw / OpenClaw ---
              - key: ALPHACLAW_ROOT_DIR
                value: /data
              - key: SETUP_PASSWORD
                generateValue: true
              - key: OPENCLAW_GATEWAY_TOKEN
                generateValue: true
              - key: PORT
                value: "10000"

              # --- GBrain database ---
              # Render Postgres connection string, injected from the database below.
              # GBrain reads DATABASE_URL when initialized with --url.
              - key: DATABASE_URL
                fromDatabase:
                  name: openclaw-gbrain-db
                  property: connectionString

              # --- GBrain API keys (required at deploy time) ---
              # OpenAI: embeddings (text-embedding-3-large)
              # Anthropic: multi-query expansion + LLM chunking (Haiku)
              - key: OPENAI_API_KEY
                sync: false
              - key: ANTHROPIC_API_KEY
                sync: false

              # --- GBrain runtime config ---
              - key: GBRAIN_HOME
                value: /data/.gbrain

        databases:
          - name: openclaw-gbrain-db
            plan: basic-256mb
            databaseName: gbrain
            user: gbrain
            postgresMajorVersion: "16"
            # pgvector and pg_trgm are enabled on first boot via the Dockerfile
            # entrypoint (Render Postgres allows CREATE EXTENSION for both
            # without elevated privileges).
